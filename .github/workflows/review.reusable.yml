name: Claude Reviewer (reusable)

# Reusable workflow appelé par chaque repo cible via un caller de ~20 lignes.
# Toute la logique vit ICI (source unique). Mettre à jour le reviewer = éditer ce
# fichier + les prompts/, puis déplacer le tag `v1`. Les repos pointent sur @v1.
#
# Auth : abonnement Claude Max via CLAUDE_CODE_OAUTH_TOKEN (claude setup-token).
# AUCUN ANTHROPIC_API_KEY nulle part → zéro facturation API/credits.

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Ref du repo central d'où charger les prompts. Doit matcher le @ref du caller.
env:
  REVIEWER_REPO: Ainoob59/claude-pr-reviewer
  REVIEWER_REF: v1

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # L0 — gate déterministe (bash pur, 0 token). Décide : on review ? quel mode ?
  # quel modèle ? Skip les PR triviales pour économiser le quota.
  # ───────────────────────────────────────────────────────────────────────────
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      mode: ${{ steps.t.outputs.mode }}
      # Le modèle/le run peuvent être affinés par l'étage Haiku (sur le contenu du
      # diff). S'il ne tourne pas (ou échoue), on retombe sur l'heuristique bash.
      model: ${{ steps.classify.outputs.model || steps.t.outputs.model }}
      run: ${{ steps.classify.outputs.run || steps.t.outputs.run }}
    steps:
      - id: t
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          # On passe les valeurs par env (jamais inliné dans le bash) → pas
          # d'injection de script via le corps d'un commentaire malveillant.
          COMMENT_BODY: ${{ github.event.comment.body }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_NUM_PR: ${{ github.event.pull_request.number }}
          PR_NUM_IC: ${{ github.event.issue.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request.url }}
          # Avant/après du push, fournis par GitHub uniquement sur action=synchronize.
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          RUN=false; MODE=""; MODEL="claude-sonnet-4-6"; PR=""; NEEDS_CLASSIFY=false

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            # Ne traiter que les commentaires SUR une PR contenant le trigger.
            if [ -n "${IS_PR_COMMENT:-}" ]; then
              low=$(printf '%s' "${COMMENT_BODY:-}" | tr '[:upper:]' '[:lower:]')
              case "$low" in
                *"@claude fix"*)    MODE=fix;         MODEL=claude-opus-4-8;  RUN=true ;;
                *"@claude review"*) MODE=deep-review; MODEL=claude-opus-4-8;  RUN=true ;;
                *"@claude"*)        MODE=ask;         MODEL=claude-sonnet-4-6; RUN=true ;;
              esac
              PR="$PR_NUM_IC"
            fi

          elif [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
            PR="$PR_NUM_PR"
            if [ "$EVENT_ACTION" = "labeled" ]; then
              # Le label force une review profonde (Opus, ignore le skip).
              if [ "${LABEL_NAME:-}" = "claude-assist" ]; then
                MODE=deep-review; MODEL=claude-opus-4-8; RUN=true
              fi
            else
              MODE=review; RUN=true
              # Skip les drafts (sauf review forcée par label/commande).
              [ "${PR_DRAFT:-false}" = "true" ] && RUN=false
            fi
          fi

          # Pour les modes review/deep-review : mesurer le diff (garde-fous + modèle).
          if [ "$RUN" = "true" ] && { [ "$MODE" = "review" ] || [ "$MODE" = "deep-review" ]; }; then
            total=0; nfiles=0; nonskip=0; sensitive=0
            while IFS=$'\t' read -r fn ch; do
              [ -z "${fn:-}" ] && continue
              nfiles=$((nfiles+1)); total=$((total + ${ch:-0}))
              case "$fn" in
                *.lock|*/dist/*|*/build/*|*/node_modules/*|*.min.js|*.min.css|*.generated.*|\
                */__snapshots__/*|*.snap|package-lock.json|pnpm-lock.yaml|yarn.lock|\
                *.svg|*.png|*.jpg|*.jpeg|*.gif|*.webp|*.pdf|*.map|*.lockb) : ;;     # générés/binaires
                *.md|*.mdx|*.txt|docs/*|*/docs/*) : ;;                              # docs → non bloquant
                *) nonskip=$((nonskip+1)) ;;
              esac
              case "$fn" in
                *auth*|*Auth*|*login*|*session*|*token*|*password*|*payment*|*Payment*|*billing*|\
                *checkout*|*migration*|*Migration*|*security*|*Security*|*crypto*|*secret*|\
                *.github/workflows/*|*Dockerfile*|*.tf|*terraform*|*permission*|*rbac*) sensitive=1 ;;
              esac
            done < <(gh api --paginate "repos/$REPO/pulls/$PR/files" \
                       --jq '.[] | [.filename, (.additions + .deletions)] | @tsv')

            # Sur un re-push (synchronize) sur une PR déjà ouverte, le garde-fou
            # anti-trivial doit regarder ce que CE push a changé, pas le cumul de
            # toute la PR — sinon un fixup d'une ligne re-déclenche une review
            # complète tant que la PR reste non-triviale globalement (jamais
            # amorti). Best-effort : si le compare échoue (fork, refs
            # manquantes…) → on retombe sur le total cumulé, jamais un skip par
            # erreur (fail-open, pas fail-closed).
            gate_total=$total; gate_nonskip=$nonskip
            if [ "$MODE" = "review" ] && [ "$EVENT_ACTION" = "synchronize" ] \
               && [ -n "${EVENT_BEFORE:-}" ] \
               && [ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
              if compare_json="$(gh api "repos/$REPO/compare/$EVENT_BEFORE...$EVENT_AFTER" 2>/dev/null)"; then
                inc_total=0; inc_nonskip=0
                while IFS=$'\t' read -r fn ch; do
                  [ -z "${fn:-}" ] && continue
                  inc_total=$((inc_total + ${ch:-0}))
                  case "$fn" in
                    *.lock|*/dist/*|*/build/*|*/node_modules/*|*.min.js|*.min.css|*.generated.*|\
                    */__snapshots__/*|*.snap|package-lock.json|pnpm-lock.yaml|yarn.lock|\
                    *.svg|*.png|*.jpg|*.jpeg|*.gif|*.webp|*.pdf|*.map|*.lockb) : ;;
                    *.md|*.mdx|*.txt|docs/*|*/docs/*) : ;;
                    *) inc_nonskip=$((inc_nonskip+1)) ;;
                  esac
                done < <(printf '%s' "$compare_json" | jq -r '.files[]? | [.filename, (.additions + .deletions)] | @tsv')
                gate_total=$inc_total; gate_nonskip=$inc_nonskip
                echo "Triage: incrémental depuis ${EVENT_BEFORE:0:7} → nonskip=$inc_nonskip lignes=$inc_total (PR totale: nonskip=$nonskip lignes=$total)"
              else
                echo "Triage: compare ${EVENT_BEFORE:0:7}...${EVENT_AFTER:0:7} indisponible → fallback total PR"
              fi
            fi

            # Garde-fou anti-trivial (review auto seulement, pas deep-review).
            if [ "$MODE" = "review" ]; then
              if [ "$gate_nonskip" -eq 0 ] || [ "$gate_total" -lt 25 ]; then
                RUN=false
                echo "Triage: push trivial (nonskip=$gate_nonskip, total=$gate_total) → skip"
              fi
            fi

            # Escalade Opus : gros diff OU chemin sensible OU deep-review.
            if [ "$sensitive" -eq 1 ] || [ "$total" -gt 600 ] || [ "$nfiles" -gt 12 ] || [ "$MODE" = "deep-review" ]; then
              MODEL=claude-opus-4-8
            fi
            echo "Triage L0 (bash): mode=$MODE files=$nfiles lines=$total sensitive=$sensitive → model=$MODEL run=$RUN"

            # En mode review auto et non-trivial : confier le choix du modèle à
            # l'étage Haiku (jugement sur le CONTENU). deep-review reste Opus forcé.
            if [ "$MODE" = "review" ] && [ "$RUN" = "true" ]; then NEEDS_CLASSIFY=true; fi
          fi

          {
            echo "run=$RUN"
            echo "mode=$MODE"
            echo "model=$MODEL"
            echo "pr=$PR"
            echo "needs_classify=$NEEDS_CLASSIFY"
          } >> "$GITHUB_OUTPUT"

      # L1 — triage par CONTENU (Haiku lit le diff). Best-effort : toute erreur →
      # on garde le modèle de l'heuristique bash, la review tourne quand même.
      - id: classify
        if: steps.t.outputs.needs_classify == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.t.outputs.pr }}
        run: |
          set -uo pipefail   # pas de -e : on ne casse jamais le run sur un échec Haiku
          if ! npm install -g @anthropic-ai/claude-code >/dev/null 2>&1; then
            echo "Haiku: install CLI KO → fallback bash"; exit 0
          fi
          DIFF="$(gh pr diff "$PR" -R "$REPO" 2>/dev/null | head -c 50000 || true)"
          if [ -z "$DIFF" ]; then echo "Haiku: diff vide → fallback bash"; exit 0; fi
          PROMPT='You are a code-review triage classifier. Read the unified diff piped via stdin and output EXACTLY ONE WORD, nothing else:
          OPUS   — the change is logically complex OR touches risk-sensitive behavior in its CONTENT: authentication, authorization, payments/billing/money, cryptography, secrets or API keys, database migrations, concurrency, access control, or untrusted input reaching a dangerous sink.
          SONNET — a normal change.
          SKIP   — purely cosmetic with zero behavioral risk (formatting, comments, trivial renames).
          Answer with only one of: OPUS, SONNET, SKIP.'
          VERDICT="$(printf '%s' "$DIFF" | claude -p "$PROMPT" --model claude-haiku-4-5-20251001 2>/dev/null | tr '[:lower:]' '[:upper:]' || true)"
          echo "Haiku verdict: '$VERDICT'"
          case "$VERDICT" in
            *OPUS*)   echo "model=claude-opus-4-8"   >> "$GITHUB_OUTPUT"; echo "→ Opus (contenu sensible/complexe)" ;;
            *SKIP*)   echo "run=false" >> "$GITHUB_OUTPUT"; echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"; echo "→ skip (cosmétique)" ;;
            *SONNET*) echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"; echo "→ Sonnet" ;;
            *)        echo "→ verdict illisible, fallback bash" ;;
          esac
          exit 0

  # ───────────────────────────────────────────────────────────────────────────
  # Review / deep-review / ask  (lecture seule + écriture de commentaires)
  # ───────────────────────────────────────────────────────────────────────────
  review:
    needs: triage
    if: needs.triage.outputs.run == 'true' && needs.triage.outputs.mode != 'fix'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout du repo cible (le code à reviewer)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Charger les prompts du repo central
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REVIEWER_REPO }}
          ref: ${{ env.REVIEWER_REF }}
          path: .reviewer

      - name: Accusé de réception 👀
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes >/dev/null 2>&1 || true
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions" -f content=eyes >/dev/null 2>&1 || true
          fi

      - name: Construire le prompt
        id: p
        env:
          MODE: ${{ needs.triage.outputs.mode }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "$MODE" in
            ask) f=.reviewer/prompts/ask.md ;;
            *)   f=.reviewer/prompts/review.md ;;
          esac
          {
            echo 'PROMPT<<CLAUDE_EOF'
            echo "REPO: $REPO"
            echo "MODE: $MODE"
            echo ""
            cat "$f"
            echo 'CLAUDE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: ${{ steps.p.outputs.PROMPT }}
          claude_args: |
            --model ${{ needs.triage.outputs.model }}
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api:*),Bash(gh search:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(cat:*),Bash(ls:*)"

  # ───────────────────────────────────────────────────────────────────────────
  # Fix  (module boucle review→fix→re-vérif). Écrit du code et push sur la branche.
  # Déclenché uniquement par « @claude fix ». Permissions write isolées ici.
  # ───────────────────────────────────────────────────────────────────────────
  fix:
    needs: triage
    if: needs.triage.outputs.run == 'true' && needs.triage.outputs.mode == 'fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Sur un issue_comment, il faut résoudre la BRANCHE de la PR pour que les
      # commits de Claude atterrissent dessus (sinon checkout = branche par défaut).
      - name: Résoudre la branche de la PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          branch="$(gh pr view "$PR" -R "$REPO" --json headRefName --jq .headRefName)"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Fix sur la branche: $branch (PR #$PR)"

      - name: Checkout de la branche PR
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Charger les prompts du repo central
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REVIEWER_REPO }}
          ref: ${{ env.REVIEWER_REF }}
          path: .reviewer

      - name: Accusé de réception 👀
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes >/dev/null 2>&1 || true

      - name: Configurer git (pour les commits de Claude)
        run: |
          git config user.name  "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"

      - name: Construire le prompt fix
        id: p
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          set -euo pipefail
          {
            echo 'PROMPT<<CLAUDE_EOF'
            echo "REPO: $REPO"
            echo "PR NUMBER: $PR"
            echo "PR BRANCH (déjà checkout, pousse ici): $BRANCH"
            echo ""
            cat .reviewer/prompts/fix.md
            echo 'CLAUDE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Claude fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.p.outputs.PROMPT }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --allowedTools "Edit,Write,Read,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(git status:*),Bash(git diff:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(cat:*),Bash(ls:*)"
